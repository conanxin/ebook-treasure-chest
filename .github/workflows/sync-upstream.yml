name: Sync Fork With Upstream
on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: sync-upstream
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add upstream
        run: |
          git remote add upstream https://github.com/jbiaojerry/ebook-treasure-chest.git || git remote set-url upstream https://github.com/jbiaojerry/ebook-treasure-chest.git
          git fetch upstream main
          git fetch origin main
      - name: Sync main from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git reset --hard origin/main
          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "Fork is already up to date with upstream."
            exit 0
          fi
          git merge upstream/main --no-edit
          git push origin main
